# docker-compose.yml (producción)
# --------------------------------------------------------------------------------------
# WARNING: ENVIRONMENT SWITCH
# --------------------------------------------------------------------------------------
#
# This file is currently configured for the DEVELOPMENT environment.#
# To switch to PRODUCTION, you need to manually change the 'target' build argument
# in the relevant services.#
# Example:
#
#   subvenciones-api:
#     build:
#       target: development  <-- CHANGE TO 'production'
#
# Also, be sure to use the correct environment variable file (.env) for each environment.
#
# --------------------------------------------------------------------------------------

services:
  workspaces-service:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
      args:
        WORKSPACE_NAME: conta360
    volumes:
      - .:/workspaces/conta360
    networks:
      - conta360-network
    env_file:
      - .env
    command: sleep infinity
    user: vscode
  
  dashboard_app:
    build:
      context: ./src/microfrontends/dashboard_app
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "3001:3001"
    volumes:
      - ./src/microfrontends/dashboard_app:/app
      - /app/node_modules
    environment:
      - NODE_ENV=${NODE_ENV}
      - IS_DOCKER_COMPOSE=true
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_PRIVATE_LOCAL_WEBPACK=true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/_next/static/chunks/remoteEntry.js || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - conta360-network
    env_file:
      - .env

  root_config:
    build:
      context: ./src/microfrontends/root_config
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SUBVENCIONES_API_URL: ${NEXT_PUBLIC_SUBVENCIONES_API_URL}
    ports:
      - "3000:3000"
    volumes:
      - ./src/microfrontends/root_config:/app
      - /app/node_modules
    environment:
      - NODE_ENV=${NODE_ENV}
      - IS_DOCKER_COMPOSE=true
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_PRIVATE_LOCAL_WEBPACK=true
    depends_on:
      dashboard_app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/_next/static/chunks/remoteEntry.js || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - conta360-network
    env_file:
      - .env

  presentation-api:
    build:
      context: .
      dockerfile: ./src/backend/Presentation/Dockerfile
      target: development
      args:
        ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
    image: conta360-presentation-api:latest
    ports:
      - "5000:80"
    volumes:
      - ./src/backend:/src/backend
      - presentation-api-data:/app/data
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_URLS=${ASPNETCORE_URLS}
      - ConnectionStrings__SqliteConnection=Data Source=/app/data/conta360.db
    healthcheck:
      test: ["CMD", "dotnet", "--info"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - conta360-network
    env_file:
      - .env

  postgres-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST_SUBVENCIONES}
      POSTGRES_DB: ${POSTGRES_DB_SUBVENCIONES}
      POSTGRES_USER: ${POSTGRES_USER_SUBVENCIONES}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_SUBVENCIONES}
      POSTGRES_PORT: ${POSTGRES_PORT_SUBVENCIONES}
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-uuid-ossp.sql:/docker-entrypoint-initdb.d/init-uuid-ossp.sql:ro
    networks:
      - conta360-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER_SUBVENCIONES} -d ${POSTGRES_DB_SUBVENCIONES}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - postgres-db
    networks:
      - conta360-network
    env_file:
      - .env

  subvenciones-api:
    build:
      context: .
      dockerfile: ./src/SubvencionesApp/Dockerfile
    ports:
      - "5001:80"
    volumes:
      - ./src/SubvencionesApp:/src/SubvencionesApp
      - subvenciones-api-data:/app/data
    environment:
      - ConnectionStrings__POSTGRESQLConnection=Host=${POSTGRES_HOST_SUBVENCIONES};Port=${POSTGRES_PORT_SUBVENCIONES};Database=${POSTGRES_DB_SUBVENCIONES};Username=${POSTGRES_USER_SUBVENCIONES};Password=${POSTGRES_PASSWORD_SUBVENCIONES};Pooling=true;MinPoolSize=0;MaxPoolSize=100;CommandTimeout=60
    depends_on:
      postgres-db:
        condition: service_healthy
      subvenciones-migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "dotnet", "--info"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - conta360-network
    env_file:
      - .env

  subvenciones-migrations:
    build:
      context: .
      dockerfile: ./src/SubvencionesApp/Dockerfile.Migrations
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ConnectionStrings__POSTGRESQLConnection=Host=${POSTGRES_HOST_SUBVENCIONES};Port=${POSTGRES_PORT_SUBVENCIONES};Database=${POSTGRES_DB_SUBVENCIONES};Username=${POSTGRES_USER_SUBVENCIONES};Password=${POSTGRES_PASSWORD_SUBVENCIONES}
    networks:
      - conta360-network
    env_file:
      - .env
    restart: "no"

networks:
  conta360-network:
    driver: bridge

volumes:
  presentation-api-data:
    driver: local
  subvenciones-api-data:
    driver: local
  postgres-data:
    driver: local
  pgadmin-data:
    driver: local