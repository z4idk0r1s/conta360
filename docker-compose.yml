# docker-compose.yml (producción)
# --------------------------------------------------------------------------------------
# WARNING: ENVIRONMENT SWITCH
# --------------------------------------------------------------------------------------
#
# This file is currently configured for the DEVELOPMENT environment.#
# To switch to PRODUCTION, you need to manually change the 'target' build argument
# in the relevant services.#
# Example:
#
#   subvenciones-api:
#     build:
#       target: development  <-- CHANGE TO 'production'
#
# Also, be sure to use the correct environment variable file (.env) for each environment.
#
# --------------------------------------------------------------------------------------

services:
  devcontainer-service:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
      args:
        WORKSPACE_NAME: conta360
    volumes:
      - .:/workspaces/conta360
    networks:
      frontend-net:
      backend-net:
    env_file:
      - .env
    command: sleep infinity
    user: vscode

  root-config:
    build:
      context: ./src/microfrontends/root-config
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SUBVENCIONES_API_URL: ${NEXT_PUBLIC_SUBVENCIONES_API_URL}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./src/microfrontends/root-config:/app
      - /app/node_modules
    environment:
      - NODE_ENV=${NODE_ENV}
      - IS_DOCKER_COMPOSE=true
    depends_on:
      dashboard-app:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      frontend-net:
        ipv4_address: 172.20.0.3
    env_file:
      - .env

  dashboard-app:
    build:
      context: ./src/microfrontends/dashboard-app
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - ./src/microfrontends/dashboard-app:/app
      - /app/node_modules
    environment:
      - NODE_ENV=${NODE_ENV}
      - IS_DOCKER_COMPOSE=true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      frontend-net:
        ipv4_address: 172.20.0.4
    env_file:
      - .env

  presentation-api:
    build:
      context: .
      dockerfile: ./src/backend/Presentation/Dockerfile
      target: development
      args:
        ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
    image: conta360-presentation-api:latest
    ports:
      - "127.0.0.1:5000:80"
    volumes:
      - ./src/backend:/src/backend
      - presentation-api-data:/app/data
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_URLS=${ASPNETCORE_URLS}
      - ConnectionStrings__SqliteConnection=Data Source=/app/data/conta360.db
    healthcheck:
      test: ["CMD", "dotnet", "--info"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      backend-net:
        ipv4_address: 172.21.0.3
      db-net:
        ipv4_address: 172.22.0.2
    env_file:
      - .env

  postgres-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB_SUBVENCIONES}
      POSTGRES_USER: ${POSTGRES_USER_SUBVENCIONES}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_SUBVENCIONES}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-uuid-ossp.sql:/docker-entrypoint-initdb.d/init-uuid-ossp.sql:ro
    networks:
      db-net:
        ipv4_address: 172.22.0.3
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER_SUBVENCIONES} -d ${POSTGRES_DB_SUBVENCIONES}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_LISTEN_PORT: 80
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "True"
      PGADMIN_CONFIG_LOGIN_BANNER: "Authorized Access Only"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    healthcheck:
      test: ["CMD", "wget", "-O", "-", "http://localhost:80/misc/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      frontend-net:
        ipv4_address: 172.20.0.5
      db-net:
    env_file:
      - .env

  subvenciones-api:
    build:
      context: .
      dockerfile: ./src/SubvencionesApp/Dockerfile
    ports:
      - "127.0.0.1:5001:80"
    volumes:
      - ./src/SubvencionesApp:/src/SubvencionesApp
      - subvenciones-api-data:/app/data
    environment:
      - ConnectionStrings__POSTGRESQLConnection=Host=postgres-db;Port=5432;Database=${POSTGRES_DB_SUBVENCIONES};Username=${POSTGRES_USER_SUBVENCIONES};Password=${POSTGRES_PASSWORD_SUBVENCIONES};Pooling=true;MinPoolSize=0;MaxPoolSize=100;CommandTimeout=60
    depends_on:
      postgres-db:
        condition: service_healthy
      subvenciones-migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "dotnet", "--info"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      backend-net:
        ipv4_address: 172.21.0.4
      db-net:
        ipv4_address: 172.22.0.0.5
    env_file:
      - .env

  subvenciones-migrations:
    build:
      context: .
      dockerfile: ./src/SubvencionesApp/Dockerfile.Migrations
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ConnectionStrings__POSTGRESQLConnection=Host=postgres-db;Port=5432;Database=${POSTGRES_DB_SUBVENCIONES};Username=${POSTGRES_USER_SUBVENCIONES};Password=${POSTGRES_PASSWORD_SUBVENCIONES}
    networks:
      db-net:
        ipv4_address: 172.22.0.6
    env_file:
      - .env
    restart: "no"

networks:
  frontend-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
          gateway: 172.20.0.1
    internal: false

  backend-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24
          gateway: 172.21.0.1
    internal: true

  db-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/24
          gateway: 172.22.0.1
    internal: true

volumes:
  presentation-api-data:
    driver: local
  subvenciones-api-data:
    driver: local
  postgres-data:
    driver: local
  pgadmin-data:
    driver: local