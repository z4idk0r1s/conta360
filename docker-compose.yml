version: '3.8'

services:
  root-config:
    build:
      context: ./src/microfrontends/root-config
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./src/microfrontends/root-config:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://validation-core:80
      - NEXT_PUBLIC_SUBVENCIONES_API_URL=http://subvenciones-api:80
      - IS_DOCKER_COMPOSE=true
    depends_on:
      validation-core:
        condition: service_healthy
      subvenciones-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - conta360-network

  validation-core:
    build:
      context: ./src/backend/Presentation/Conta360.Presentation.Api
      dockerfile: Dockerfile
      target: development
    ports:
      - "5000:80"
    volumes:
      - ./src/backend:/app/backend
      - validation-core-data:/app/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - ConnectionStrings__SqliteConnection=Data Source=/app/data/conta360.db
    command: >
      sh -c "dotnet ef database update --project backend/Presentation/Conta360.Presentation.Api/Conta360.Presentation.Api.csproj && dotnet watch --project backend/Presentation/Conta360.Presentation.Api/Conta360.Presentation.Api.csproj run --urls 'http://+:80'"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - conta360-network

  postgres-db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: conta360
      POSTGRES_PASSWORD: conta360123
      POSTGRES_DB: SubvencionesDB_Dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-uuid-ossp.sql:/docker-entrypoint-initdb.d/init-uuid-ossp.sql:ro 
    networks:
      - conta360-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conta360"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "8080:80"   # Acceso pgAdmin en http://localhost:8080
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - postgres-db
    networks:
      - conta360-network

  subvenciones-api:
    build:
      context: ./src/SubvencionesApp
      dockerfile: Dockerfile
      target: development
    ports:
      - "5001:80"
    volumes:
      - ./src/SubvencionesApp:/app/SubvencionesApp
      - subvenciones-api-data:/app/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - ConnectionStrings__POSTGRESQLConnection=Host=postgres-db;Port=5432;Database=conta360db;Username=conta360;Password=conta360123
    depends_on:
      postgres-db:
        condition: service_healthy
    command: >
      sh -c "dotnet ef database update --project SubvencionesApp.Api.csproj && dotnet watch --project SubvencionesApp.Api.csproj run --urls 'http://+:80'"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - conta360-network

  dashboard-app:
    build:
      context: ./src/microfrontends/dashboard-app
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./src/microfrontends/dashboard-app:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://validation-core:80
      - IS_DOCKER_COMPOSE=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - conta360-network

networks:
  conta360-network:
    driver: bridge

volumes:
  validation-core-data:
    driver: local
  subvenciones-api-data:
    driver: local
  postgres-data:
    driver: local
  pgadmin-data:
    driver: local
